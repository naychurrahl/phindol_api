openapi: 3.0.4

info:
  title: SWIFT DROP
  description: Swift drop logistics
  version: 0.0.1

servers:
  - url: '{scheeme}://localhost:6600/'
    description: offline production unit
    variables:
      scheeme:
        description: http s or not
        default: http
        enum:
         - http
         - https

  - url: '{scheeme}://Swiftdrop.com:6600/'
    description: online production unit
    variables:
      scheeme:
        description: http s or not
        default: https
        enum:
         - http
         - https

components:
  securitySchemes:
    Auth:
      type: apiKey
      in: header
      name: Authorization
    Login:
      type: apiKey
      in: header
      name: Authorization
    Reset:
      type: apiKey
      in: header
      name: Authorization
    Signup:
      type: apiKey
      in: header
      name: Authorization

paths:
  #=============== AUTH =====================

  /auth/register:
    post:
      summary: Creates a new user
      description: >
        <h1>Creates a new user</h1>
        takes <ul>
        <li>email</li>
        <li>role</li>
        <li>names</li>
        <li>password</li>
        </ul> as form input 

      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  example: "e@mail.com"
                role:
                  type: string
                  enum: ['consumer', 'business', 'driver', 'admin']
                  example: "consumer"
                names:
                  type: string
                  example: "Olopade Isaiah Jekunde"
                password:
                  type: string
                  example: "strongPassword123!"

      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  userId:
                    type: string
                  email:
                    type: string
                  token:
                    type: string
                  otp:
                    type: string
                example:
                  userId: '1234567890'
                  email: 'e@mail.com'
                  token: 'lckweiwory9rf.uo3oeshfbcdcblakjhaldsnckj.dxnkjldnsakjc'

        "400":
          description: Bad request
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    'error': string
                example:
                  'error': 'error message'

        "500":
          description: INTERNAL ERROR!
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    error: string
                example:
                  error: Internal ERROR!

  /auth/register/{token}:
    patch:
      summary: Creates a new user
      description: >
        <h1> Activate user </h1>
        Complete the registration flow here</br>
        Takes <b>{token}</b> as input from path
      security:
        - Signup: []

      parameters:
        - in: path
          name: token
          required: true
          schema:
            type: string
          description: user's id
          example: user_12346678

      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    '200': string
                example:
                  '200': 'OTP sent'

        "500":
          description: error!
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    error: string
                example:
                  error: Internal ERROR!

